[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short --strict-markers"

[tool.coverage.run]
source = ["."]
omit = ["tests/*", ".venv/*", "deploy/*", "vault/*", "specs/*", "configs/*"]

[tool.coverage.report]
fail_under = 90
show_missing = true

[tool.coverage.branch]
fail_under = 70

[tool.mutmut]
source_paths = ["param_hermes_mcp.py"]
backup = false
runner = "python -m pytest"
