# PARAM Skill Sets — Per-Agent-Type Whitelist
#
# Hermes loads ALL 71 skills into every session's system prompt.
# This bloat (~15K+ tokens) can be reduced by loading only relevant skills.
#
# Implementation option A (Phase 6): Patch prompt_builder.py to support
#   skills.include in config.yaml (mirrors existing skills.disabled pattern).
#
# Implementation option B (now): Use skills.disabled to block non-relevant
#   skills per platform. Works today but requires maintaining the inverse list.
#
# These sets serve as the canonical reference regardless of implementation.

# ============================================================================
# OMO Agent Roles → Required Skill Sets
# ============================================================================

sisyphus:  # orchestrator — coordinates all agents
  - systematic-debugging
  - requesting-code-review
  - simplify-code
  - plan
  - hermes-agent
  - opencode

oracle:  # high-IQ reasoning — debugging + architecture
  - systematic-debugging
  - simplify-code
  - hermes-agent

explore:  # codebase search — grep/ast-grep patterns
  - codebase-inspection
  - hermes-agent

