#
# PARAM / Hermes NAS Docker Deployment
# ====================================
# Target: Ugreen NAS with Docker Compose
# Image:  nousresearch/hermes-agent:latest (public Docker Hub)
#
# Single container runs both gateway + dashboard via s6 supervision.
# Cloudflared runs natively (not in Docker — simpler, fewer path issues).

services:
  # TokenEye — LLM proxy with load balancing between opencode-go accounts
  tokeneye:
    image: oven/bun:latest
    container_name: param-tokeneye
    restart: unless-stopped
    network_mode: host
    working_dir: /app
    volumes:
      - /home/Nasama-Pochu/param/tokeneye:/app-src:ro
      - /home/Nasama-Pochu/param/tokeneye-config:/root/.config/tokeneye
    command: ["sh", "-c", "mkdir -p /app/work && cp /app-src/* /app/work/ 2>/dev/null; cd /app/work && bun install && exec bun run src/index.ts"]
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: param
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./hermes-data:/opt/data
      - ./hermes-data/scripts:/opt/data/scripts
      - /home/Nasama-Pochu/param/vault:/workspace/vault
      - /home/Nasama-Pochu/.cloudflared:/home/nonroot/.cloudflared:ro
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_INSECURE=1
    command: ["gateway", "run"]
