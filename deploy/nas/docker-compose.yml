#
# PARAM Docker Deployment — UGREEN NAS
# All services use restart: unless-stopped for boot survival.

services:
  # Hermes — gateway + dashboard via s6 supervision
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: param
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./hermes-data:/opt/data
      - ./hermes-data/scripts:/opt/data/scripts
      - /home/Nasama-Pochu/param/vault:/workspace/vault
      - /home/Nasama-Pochu/.cloudflared:/home/nonroot/.cloudflared:ro
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_INSECURE=1
    command: ["gateway", "run"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9119/", "-o", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - tokeneye

  # TokenEye — LLM proxy with 2-key opencode-go load balancing
  tokeneye:
    image: oven/bun:latest
    container_name: param-tokeneye
    restart: unless-stopped
    network_mode: host
    working_dir: /app
    volumes:
      - /home/Nasama-Pochu/param/tokeneye/src:/app/src:ro
      - /home/Nasama-Pochu/param/tokeneye/package.json:/app/package.json:ro
      - /home/Nasama-Pochu/param/tokeneye/tsconfig.json:/app/tsconfig.json:ro
      - /home/Nasama-Pochu/param/tokeneye-config:/root/.config/tokeneye
      - tokeneye_modules:/app/node_modules
    command: ["sh", "-c", "[ -f node_modules/.package-lock.json ] || bun install --frozen-lockfile; exec bun run src/index.ts"]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8787/__health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # Nginx — PWA + basic auth reverse proxy for dashboard
  nginx:
    image: nginx:alpine
    container_name: param-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/Nasama-Pochu/param/deploy/nas/pwa:/pwa:ro
      - /home/Nasama-Pochu/param/deploy/nas/pwa/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hermes
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Vaultwarden — lightweight Bitwarden-compatible secrets vault
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: param-vaultwarden
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/Nasama-Pochu/param/vaultwarden-data:/data
    environment:
      - SIGNUPS_ALLOWED=false
      - WEBSOCKET_ENABLED=true
      - DOMAIN=https://vault.param.aiforges.app
      - ROCKET_PORT=8311
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8311/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Websurfx — privacy-respecting meta search engine (Rust)
  websurfx:
    image: neonmmd/websurfx:latest
    container_name: param-websurfx
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/Nasama-Pochu/param/deploy/nas/websurfx/config.lua:/etc/xdg/websurfx/config.lua:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8989/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - vaultwarden

  # Cloudflare Tunnel — routes through nginx (port 8080)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: param-cloudflared
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/Nasama-Pochu/.cloudflared:/home/nonroot/.cloudflared:ro
    command: ["tunnel", "--config", "/home/nonroot/.cloudflared/config.yml", "run"]
    depends_on:
      - nginx

volumes:
  tokeneye_modules:
