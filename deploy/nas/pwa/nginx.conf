worker_processes 1;
events { worker_connections 1024; }

http {
    server {
        listen 9090;

        # PWA files
        location = /manifest.json {
            root /pwa;
            types { application/manifest+json json; }
            add_header Cache-Control "public, max-age=3600";
        }
        location = /sw.js {
            root /pwa;
            types { application/javascript js; }
            add_header Service-Worker-Allowed /;
        }
        location = /icon-192.png { root /pwa; try_files /icon-192.png =404; }
        location = /icon-512.png { root /pwa; try_files /icon-512.png =404; }
        location = / {
            root /pwa;
            try_files /index.html =404;
        }

        # Vaultwarden API — BLOCKED on this hostname (security: was publicly exposing Bitwarden API)
        # Use vault.param.aiforges.app instead (direct tunnel to :8311, behind Cloudflare Access)
        location ~ ^/(api|identity|admin|notifications|vault|vw_static)(/|$) { return 403; }

        # Dashboard — auth protected
        location /dashboard {
            auth_basic "PARAM Access";
            auth_basic_user_file /pwa/.htpasswd;
            proxy_pass http://hermes:9119/;
        }

        # Default — auth protected Hermes dashboard
        location / {
            auth_basic "PARAM Access";
            auth_basic_user_file /pwa/.htpasswd;
            proxy_pass http://hermes:9119;
        }
    }
}
