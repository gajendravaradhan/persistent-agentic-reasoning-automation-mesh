worker_processes 1;
events { worker_connections 1024; }

http {
    server {
        listen 9090;

        # PWA files
        location = /manifest.json {
            root /pwa;
            types { application/manifest+json json; }
            add_header Cache-Control "public, max-age=3600";
        }
        location = /sw.js {
            root /pwa;
            types { application/javascript js; }
            add_header Service-Worker-Allowed /;
        }
        location = /icon-192.png { root /pwa; try_files /icon-192.png =404; }
        location = /icon-512.png { root /pwa; try_files /icon-512.png =404; }
        location = / {
            root /pwa;
            try_files /index.html =404;
        }

        # Vaultwarden — proxy all its paths directly (no rewriting)
        location /vault/ { proxy_pass http://127.0.0.1:8311/; }
        location /vw_static/ { proxy_pass http://127.0.0.1:8311/vw_static/; }
        location /admin { proxy_pass http://127.0.0.1:8311/admin; }
        location /api/ { proxy_pass http://127.0.0.1:8311/api/; }
        location /identity { proxy_pass http://127.0.0.1:8311/identity; }
        location /notifications { proxy_pass http://127.0.0.1:8311/notifications; }

        # Dashboard — auth protected
        location /dashboard {
            auth_basic "PARAM Access";
            auth_basic_user_file /pwa/.htpasswd;
            proxy_pass http://127.0.0.1:9119/;
        }

        # Default — auth protected Hermes dashboard
        location / {
            auth_basic "PARAM Access";
            auth_basic_user_file /pwa/.htpasswd;
            proxy_pass http://127.0.0.1:9119;
        }
    }
}
